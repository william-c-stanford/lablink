name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-agent:
    name: Build Go agent (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: lablink-agent-linux-amd64
          - goos: darwin
            goarch: arm64
            artifact: lablink-agent-darwin-arm64
          - goos: darwin
            goarch: amd64
            artifact: lablink-agent-darwin-amd64
          - goos: windows
            goarch: amd64
            artifact: lablink-agent-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: Build
        working-directory: agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${{ github.ref_name }}"
          LDFLAGS="-s -w -X github.com/william-c-stanford/lablink/agent/cmd.Version=${VERSION}"
          go build -ldflags "${LDFLAGS}" -o "bin/${{ matrix.artifact }}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: agent/bin/${{ matrix.artifact }}
          retention-days: 1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-agent

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
