name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions: {}

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Check lint (ruff)
        run: ruff check src/ tests/
      - name: Check formatting (ruff)
        run: ruff format --check src/ tests/
      - name: Type check (mypy)
        run: mypy src/lablink/ --ignore-missing-imports

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest tests/ -x -q --tb=short

  e2e:
    name: E2E Tests
    # Always run on main merges; on PRs only when triggered manually via [e2e] in title
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@latest

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npx vite build
        working-directory: frontend

      - name: Run migrations
        run: alembic upgrade head
        env:
          LABLINK_DATABASE_URL: sqlite+aiosqlite:///./lablink.db

      - name: Seed database
        run: python -m lablink.scripts.seed
        env:
          LABLINK_DATABASE_URL: sqlite+aiosqlite:///./lablink.db

      - name: Start API server (background)
        run: |
          uvicorn lablink.main:app --host 0.0.0.0 --port 8000 &
          echo $! > /tmp/api.pid
        env:
          LABLINK_DATABASE_URL: sqlite+aiosqlite:///./lablink.db
          LABLINK_CORS_ORIGINS: '["http://localhost:5173"]'

      - name: Start frontend static server (background)
        run: |
          npx serve frontend/dist --listen 5173 &
          echo $! > /tmp/fe.pid

      - name: Wait for services to be healthy
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && \
            curl -sf http://localhost:5173 && \
            echo "Services ready" && exit 0
            sleep 2
          done
          echo "Services did not start in time" && exit 1

      - name: Run E2E tests
        run: python -m pytest tests/e2e/ -v --tb=short -m e2e
        env:
          LABLINK_DATABASE_URL: sqlite+aiosqlite:///./lablink.db

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: e2e-screenshots
          path: /tmp/e2e-failure-*.png
          if-no-files-found: ignore
