# LabLink Development Infrastructure
# Usage: docker compose up -d
# All services are optional for local dev (SQLite, local FS, in-memory mocks).
# Start these when you want real backing services.

services:
  # ── PostgreSQL 16 ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lablink
      POSTGRES_PASSWORD: lablink
      POSTGRES_DB: lablink
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lablink"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis 7 ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Elasticsearch 9 ──────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── MinIO (S3-compatible object storage) ──────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: lablink
      MINIO_ROOT_PASSWORD: lablink123
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO bucket initializer (creates default bucket on first run) ───
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set lablink http://minio:9000 lablink lablink123 &&
      mc mb --ignore-existing lablink/lablink-uploads &&
      mc anonymous set download lablink/lablink-uploads &&
      echo 'Bucket lablink-uploads ready'
      "

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  minio_data:
